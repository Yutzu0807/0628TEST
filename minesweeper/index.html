<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>踩地雷</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --cell: #edf1f7;
      --cell-hover: #e2e8f2;
      --open: #ffffff;
      --line: #dfe5ee;
      --text: #263044;
      --muted: #7b879b;
      --accent: #6750a4;
      --accent-soft: #eee8ff;
      --danger: #e95062;
      --success: #45ad7d;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Inter", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% -10%, rgba(103,80,164,.12), transparent 38rem),
        var(--bg);
      user-select: none;
    }

    .game {
      width: min(100%, 520px);
      padding: clamp(18px, 4vw, 30px);
      border: 1px solid rgba(32,43,64,.07);
      border-radius: 24px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 20px 60px rgba(38,48,68,.14);
      overflow: hidden;
    }

    .title-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.65rem, 6vw, 2.25rem);
      letter-spacing: -.04em;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: .82rem;
    }

    .status {
      min-height: 1.6em;
      color: var(--accent);
      font-weight: 800;
      text-align: right;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 16px;
    }

    .counter, button {
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #f7f8fb;
    }

    .counter {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 7px 13px;
    }

    .counter span {
      color: var(--muted);
      font-size: .7rem;
      letter-spacing: .08em;
    }

    .counter strong {
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
    }

    button {
      padding: 0 16px;
      color: white;
      background: var(--accent);
      border-color: transparent;
      cursor: pointer;
      font: inherit;
      font-size: 1.25rem;
      transition: transform .15s, filter .15s;
    }

    button:hover { filter: brightness(1.08); transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    button:focus-visible, .cell:focus-visible {
      outline: 3px solid rgba(255,180,84,.55);
      outline-offset: 2px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: clamp(3px, 1vw, 5px);
      padding: clamp(7px, 2vw, 10px);
      border: 1px solid var(--line);
      border-radius: 17px;
      background: #f2f4f8;
      position: relative;
      perspective: 900px;
      transition: background .12s, box-shadow .12s;
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      min-width: 0;
      border: 0;
      border-radius: clamp(5px, 1.5vw, 8px);
      color: var(--text);
      background: linear-gradient(145deg, #f8faff, #e6ebf3);
      box-shadow: 0 2px 6px rgba(38,48,68,.11);
      cursor: pointer;
      font-size: clamp(.85rem, 4.1vw, 1.35rem);
      font-weight: 900;
      line-height: 1;
      transition: transform .1s, background .15s;
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }

    .cell:hover:not(.open) { background: var(--cell-hover); transform: translateY(-1px); }
    .cell.open {
      color: var(--muted);
      background: var(--open);
      box-shadow: inset 0 0 0 1px #e8ecf2;
      cursor: default;
      animation: flip-open .42s cubic-bezier(.2,.75,.25,1) both;
    }
    .cell.flagged {
      font-size: clamp(.8rem, 3.6vw, 1.2rem);
      animation: flag-bounce .34s cubic-bezier(.3,1.55,.55,1);
    }
    .cell.mine { background: rgba(255,97,116,.18); }
    .cell.exploded {
      background: var(--danger);
      animation: pop .35s ease-out;
    }
    .cell.wrong::after {
      content: "×";
      position: absolute;
      color: var(--danger);
      font-size: 1.6em;
    }

    .n1 { color: #6f9fe8 !important; }
    .n2 { color: #58b98b !important; }
    .n3 { color: #ef7d8c !important; }
    .n4 { color: #9a83d5 !important; }
    .n5 { color: #e69a65 !important; }
    .n6 { color: #55b7bd !important; }
    .n7 { color: #c99c48 !important; }
    .n8 { color: #8894a8 !important; }

    .help {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 15px 0 0;
      color: var(--muted);
      font-size: .78rem;
    }

    .win .status { color: var(--success); }
    .lose .status { color: var(--danger); }
    .lose .board {
      background: #ffccd1;
      box-shadow: inset 0 0 0 1000px rgba(233,80,98,.2);
      animation: board-shake .5s cubic-bezier(.36,.07,.19,.97);
    }

    .celebration {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 20;
    }

    .star {
      position: absolute;
      top: -24px;
      color: var(--star-color);
      font-size: var(--size);
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.12));
      animation: star-fall var(--duration) linear var(--delay) forwards;
    }

    .spark {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--spark-color);
      box-shadow: 0 0 8px var(--spark-color);
      animation: firework .8s ease-out var(--delay) both;
    }

    @keyframes pop {
      50% { transform: scale(1.2); }
    }

    @keyframes flip-open {
      from { transform: rotateX(180deg); opacity: .3; }
      to { transform: rotateX(0deg); opacity: 1; }
    }

    @keyframes flag-bounce {
      0% { transform: scale(.45) translateY(7px); }
      65% { transform: scale(1.2) translateY(-3px); }
      100% { transform: scale(1) translateY(0); }
    }

    @keyframes board-shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
      20%, 40%, 60%, 80% { transform: translateX(8px); }
    }

    @keyframes star-fall {
      to { transform: translate3d(var(--drift), 110vh, 0) rotate(720deg); opacity: .1; }
    }

    @keyframes firework {
      from { transform: translate(0,0) scale(1); opacity: 1; }
      to { transform: translate(var(--x),var(--y)) scale(.15); opacity: 0; }
    }

    @media (max-width: 410px) {
      body { padding: 10px; }
      .game { padding: 15px; border-radius: 18px; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      #restart { grid-column: 1 / -1; min-height: 44px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="game" id="game">
    <div class="title-row">
      <div>
        <h1>踩地雷</h1>
        <p class="subtitle">9 × 9 · 10 顆地雷</p>
      </div>
      <div class="status" id="status" aria-live="polite">準備好了嗎？</div>
    </div>

    <div class="toolbar">
      <div class="counter">
        <span>剩餘地雷</span>
        <strong>🚩 <b id="mines-left">10</b></strong>
      </div>
      <div class="counter">
        <span>計時器</span>
        <strong>⏱ <b id="timer">000</b></strong>
      </div>
      <button id="restart" type="button" title="重新開始" aria-label="重新開始">🙂</button>
    </div>

    <div class="board" id="board" role="grid" aria-label="9 乘 9 踩地雷盤面"></div>
    <p class="help"><span>左鍵：翻開</span><span>右鍵：插旗 🚩</span></p>
  </main>

  <script>
    (() => {
      "use strict";

      const SIZE = 9;
      const MINE_COUNT = 10;
      const boardEl = document.querySelector("#board");
      const gameEl = document.querySelector("#game");
      const minesLeftEl = document.querySelector("#mines-left");
      const timerEl = document.querySelector("#timer");
      const statusEl = document.querySelector("#status");
      const restartBtn = document.querySelector("#restart");

      let cells = [];
      let started = false;
      let ended = false;
      let flags = 0;
      let opened = 0;
      let seconds = 0;
      let timerId = null;
      let minesPlaced = false;
      let audioContext = null;

      const indexOf = (row, col) => row * SIZE + col;

      function neighbors(index) {
        const row = Math.floor(index / SIZE);
        const col = index % SIZE;
        const result = [];
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = row + dr;
            const nc = col + dc;
            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
              result.push(indexOf(nr, nc));
            }
          }
        }
        return result;
      }

      function makeBoard() {
        clearInterval(timerId);
        document.querySelector(".celebration")?.remove();
        cells = Array.from({ length: SIZE * SIZE }, (_, index) => ({
          index, mine: false, open: false, flagged: false, nearby: 0, element: null
        }));
        started = false;
        ended = false;
        minesPlaced = false;
        flags = 0;
        opened = 0;
        seconds = 0;

        boardEl.replaceChildren();
        gameEl.classList.remove("win", "lose");
        minesLeftEl.textContent = MINE_COUNT;
        timerEl.textContent = "000";
        statusEl.textContent = "準備好了嗎？";
        restartBtn.textContent = "🙂";

        for (const cell of cells) {
          const el = document.createElement("div");
          el.className = "cell";
          el.setAttribute("role", "button");
          el.setAttribute("tabindex", "0");
          el.setAttribute("aria-label", `第 ${Math.floor(cell.index / SIZE) + 1} 列，第 ${cell.index % SIZE + 1} 格`);
          el.addEventListener("click", () => openCell(cell.index));
          el.addEventListener("contextmenu", event => {
            event.preventDefault();
            toggleFlag(cell.index);
          });
          el.addEventListener("keydown", event => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openCell(cell.index);
            } else if (event.key.toLowerCase() === "f") {
              event.preventDefault();
              toggleFlag(cell.index);
            }
          });
          cell.element = el;
          boardEl.append(el);
        }
      }

      function getAudio() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return null;
        if (!audioContext) audioContext = new AudioContextClass();
        if (audioContext.state === "suspended") audioContext.resume();
        return audioContext;
      }

      function tone(frequency, duration, type = "sine", volume = .1, delay = 0, endFrequency = frequency) {
        const context = getAudio();
        if (!context) return;
        const start = context.currentTime + delay;
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, start);
        oscillator.frequency.exponentialRampToValueAtTime(Math.max(20, endFrequency), start + duration);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(volume, start + .012);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        oscillator.connect(gain).connect(context.destination);
        oscillator.start(start);
        oscillator.stop(start + duration + .02);
      }

      function noise(duration = .45, volume = .16) {
        const context = getAudio();
        if (!context) return;
        const length = Math.floor(context.sampleRate * duration);
        const buffer = context.createBuffer(1, length, context.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < length; i++) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / length);
        }
        const source = context.createBufferSource();
        const filter = context.createBiquadFilter();
        const gain = context.createGain();
        filter.type = "lowpass";
        filter.frequency.value = 650;
        gain.gain.setValueAtTime(volume, context.currentTime);
        gain.gain.exponentialRampToValueAtTime(.0001, context.currentTime + duration);
        source.buffer = buffer;
        source.connect(filter).connect(gain).connect(context.destination);
        source.start();
      }

      function playSound(kind) {
        try {
          if (kind === "open") {
            tone(520, .085, "sine", .09, 0, 690);
          } else if (kind === "flag") {
            tone(560, .09, "triangle", .1, 0, 760);
            tone(880, .11, "triangle", .08, .065, 980);
          } else if (kind === "boom") {
            noise(.55, .2);
            tone(135, .5, "sawtooth", .16, 0, 38);
            tone(75, .46, "square", .08, .02, 28);
          } else if (kind === "win") {
            [523, 659, 784, 1047].forEach((note, i) => tone(note, .22, "triangle", .1, i * .12, note * 1.03));
            tone(1319, .36, "sine", .08, .5, 1568);
          }
        } catch (_) {
          // 瀏覽器禁止音效時，遊戲仍可正常進行。
        }
      }

      // 在第一次滑鼠或觸控操作時啟動音訊，避免瀏覽器的自動播放限制。
      document.addEventListener("pointerdown", getAudio, { once: true, capture: true });

      function celebrate() {
        const layer = document.createElement("div");
        layer.className = "celebration";
        layer.setAttribute("aria-hidden", "true");
        const colors = ["#6750a4", "#ef7d8c", "#58b98b", "#e69a65", "#6f9fe8"];

        for (let i = 0; i < 52; i++) {
          const star = document.createElement("span");
          star.className = "star";
          star.textContent = i % 3 ? "★" : "✦";
          star.style.cssText = `
            left:${Math.random() * 100}%;
            --star-color:${colors[i % colors.length]};
            --size:${10 + Math.random() * 16}px;
            --duration:${1.8 + Math.random() * 1.7}s;
            --delay:${Math.random() * .65}s;
            --drift:${-55 + Math.random() * 110}px`;
          layer.append(star);
        }

        [[25, 30], [72, 25], [50, 48]].forEach(([left, top], burst) => {
          for (let i = 0; i < 18; i++) {
            const spark = document.createElement("i");
            const angle = (Math.PI * 2 * i) / 18;
            const distance = 55 + Math.random() * 55;
            spark.className = "spark";
            spark.style.cssText = `
              left:${left}%; top:${top}%;
              --spark-color:${colors[(i + burst) % colors.length]};
              --x:${Math.cos(angle) * distance}px;
              --y:${Math.sin(angle) * distance}px;
              --delay:${.15 + burst * .3}s`;
            layer.append(spark);
          }
        });

        document.body.append(layer);
        setTimeout(() => layer.remove(), 3800);
      }

      function placeMines(firstIndex) {
        const safe = new Set([firstIndex, ...neighbors(firstIndex)]);
        const candidates = cells.map(c => c.index).filter(i => !safe.has(i));

        for (let i = candidates.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
        }

        candidates.slice(0, MINE_COUNT).forEach(i => cells[i].mine = true);
        cells.forEach(cell => {
          cell.nearby = neighbors(cell.index).filter(i => cells[i].mine).length;
        });
        minesPlaced = true;
      }

      function startTimer() {
        if (started) return;
        started = true;
        statusEl.textContent = "遊戲中";
        timerId = setInterval(() => {
          seconds = Math.min(seconds + 1, 999);
          timerEl.textContent = String(seconds).padStart(3, "0");
        }, 1000);
      }

      function openCell(index) {
        const cell = cells[index];
        if (ended || cell.open || cell.flagged) return;

        if (!minesPlaced) placeMines(index);
        startTimer();

        if (cell.mine) {
          playSound("boom");
          cell.open = true;
          cell.element.textContent = "💥";
          cell.element.classList.add("open", "mine", "exploded");
          finish(false);
          return;
        }

        playSound("open");
        const queue = [index];
        const queued = new Set(queue);
        while (queue.length) {
          const current = cells[queue.shift()];
          if (current.open || current.flagged || current.mine) continue;
          revealSafeCell(current);
          if (current.nearby === 0) {
            neighbors(current.index).forEach(nextIndex => {
              const next = cells[nextIndex];
              if (!next.open && !next.flagged && !next.mine && !queued.has(nextIndex)) {
                queued.add(nextIndex);
                queue.push(nextIndex);
              }
            });
          }
        }

        if (opened === SIZE * SIZE - MINE_COUNT) finish(true);
      }

      function revealSafeCell(cell) {
        cell.open = true;
        opened++;
        cell.element.classList.add("open");
        cell.element.setAttribute("aria-disabled", "true");
        if (cell.nearby > 0) {
          cell.element.textContent = cell.nearby;
          cell.element.classList.add(`n${cell.nearby}`);
          cell.element.setAttribute("aria-label", `周圍有 ${cell.nearby} 顆地雷`);
        } else {
          cell.element.setAttribute("aria-label", "安全空格");
        }
      }

      function toggleFlag(index) {
        const cell = cells[index];
        if (ended || cell.open) return;
        if (!cell.flagged && flags >= MINE_COUNT) return;

        cell.flagged = !cell.flagged;
        playSound("flag");
        flags += cell.flagged ? 1 : -1;
        cell.element.textContent = cell.flagged ? "🚩" : "";
        cell.element.classList.toggle("flagged", cell.flagged);
        cell.element.setAttribute("aria-label", cell.flagged ? "已插旗" : "未翻開的格子");
        minesLeftEl.textContent = MINE_COUNT - flags;
      }

      function finish(won) {
        ended = true;
        clearInterval(timerId);
        gameEl.classList.add(won ? "win" : "lose");
        statusEl.textContent = won ? "過關！太厲害了 🎉" : "踩到地雷了！";
        restartBtn.textContent = won ? "😎" : "😵";

        cells.forEach(cell => {
          if (cell.mine && !cell.flagged) {
            cell.element.textContent = won ? "🚩" : "💣";
            cell.element.classList.add("open", "mine");
          } else if (!cell.mine && cell.flagged) {
            cell.element.classList.add("wrong");
          }
        });

        if (won) {
          playSound("win");
          celebrate();
          flags = MINE_COUNT;
          minesLeftEl.textContent = "0";
        }
      }

      restartBtn.addEventListener("click", makeBoard);
      boardEl.addEventListener("contextmenu", event => event.preventDefault());
      makeBoard();
    })();
  </script>
</body>
</html>
