<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="中國歷史朝代與重要事件配對練習">
  <title>朝代配對｜歷史練習</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap");

    :root {
      --ink: #110e0c;
      --ink-2: #1b1512;
      --paper: #f4e4b8;
      --paper-2: #e5ca88;
      --gold: #caa34b;
      --gold-light: #f2d681;
      --red: #a52b27;
      --red-light: #e05a4f;
      --green: #3f8d61;
      --text: #f6ead0;
      --muted: #b8aa91;
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: "Noto Serif TC", "PMingLiU", serif;
      background:
        linear-gradient(rgba(12, 9, 8, .94), rgba(12, 9, 8, .94)),
        repeating-linear-gradient(45deg, transparent 0 9px, rgba(202,163,75,.08) 9px 10px),
        #110e0c;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 8% 0%, rgba(165,43,39,.22), transparent 26rem),
        radial-gradient(circle at 90% 100%, rgba(202,163,75,.12), transparent 32rem);
    }

    button, .event-card { font: inherit; }

    .map-back {
      position: fixed; z-index: 12; top: 14px; left: 14px;
      padding: 8px 13px; border: 1px solid var(--gold); border-radius: 4px;
      color: var(--gold-light); background: rgba(17,14,12,.9);
      text-decoration: none; font-size: .78rem; font-weight: 700;
    }
    .map-back:hover { background: var(--red); }

    .app {
      position: relative;
      width: min(1380px, calc(100% - 40px));
      margin: auto;
      padding: 36px 0 48px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(202,163,75,.35);
    }

    .kicker {
      color: var(--gold);
      font-size: .78rem;
      letter-spacing: .28em;
    }

    h1 {
      margin: 5px 0 0;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1.1;
      letter-spacing: .12em;
    }

    .instructions {
      max-width: 520px;
      margin: 0;
      color: var(--muted);
      font-size: .92rem;
      text-align: right;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(510px, .95fr) minmax(430px, 1.05fr);
      gap: 24px;
      align-items: start;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 12px;
      color: var(--gold-light);
      font-size: .88rem;
      letter-spacing: .15em;
    }

    .section-label::after {
      content: "";
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, rgba(202,163,75,.42), transparent);
    }

    .dynasty-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .dynasty {
      min-height: 215px;
      overflow: hidden;
      border: 2px solid var(--gold);
      border-radius: 4px;
      color: #3c2818;
      background:
        linear-gradient(rgba(244,228,184,.96), rgba(244,228,184,.96)),
        repeating-linear-gradient(0deg, transparent 0 4px, rgba(83,52,24,.12) 4px 5px);
      box-shadow: inset 0 0 0 4px rgba(92,55,23,.12), 0 8px 22px rgba(0,0,0,.25);
      transition: transform .18s, box-shadow .18s;
    }

    .dynasty.drag-over {
      transform: translateY(-3px);
      box-shadow: 0 0 0 4px rgba(242,214,129,.22), 0 10px 28px rgba(0,0,0,.3);
    }

    .dynasty-name {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 74px;
      border-bottom: 1px solid rgba(82,49,22,.28);
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: .25em;
      text-indent: .25em;
      background: rgba(202,163,75,.13);
    }

    .drop-zone {
      min-height: 137px;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 7px;
    }

    .drop-hint {
      width: 100%;
      margin: auto;
      color: rgba(78,51,26,.47);
      text-align: center;
      font-size: .82rem;
      letter-spacing: .08em;
      pointer-events: none;
    }

    .right-panel {
      position: sticky;
      top: 18px;
    }

    .scoreboard {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr 1.4fr;
      gap: 1px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 1px solid var(--gold);
      border-radius: 4px;
      background: var(--gold);
    }

    .metric {
      min-height: 83px;
      display: grid;
      place-content: center;
      text-align: center;
      background: var(--ink-2);
    }

    .metric span {
      color: var(--muted);
      font-size: .72rem;
      letter-spacing: .12em;
    }

    .metric strong {
      color: var(--gold-light);
      font-size: 1.55rem;
      font-variant-numeric: tabular-nums;
    }

    #score.pop { animation: score-pop .3s ease; }
    #score.negative { color: var(--red-light); }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      background: var(--ink-2);
    }

    .progress {
      flex: 1;
      height: 7px;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(255,255,255,.09);
    }

    .progress-bar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--red), var(--gold-light));
      transition: width .35s ease;
    }

    .progress-text {
      min-width: 48px;
      color: var(--gold-light);
      font-size: .85rem;
      text-align: right;
    }

    .event-pool {
      min-height: 475px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-content: start;
      gap: 10px;
      padding: 16px;
      border: 1px solid rgba(202,163,75,.46);
      border-radius: 5px;
      background: rgba(27,21,18,.72);
      box-shadow: inset 0 0 35px rgba(0,0,0,.28);
    }

    .event-card {
      min-height: 61px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--red-light);
      border-left: 4px solid var(--red);
      border-radius: 4px;
      color: var(--text);
      background: linear-gradient(115deg, #251713, #171311);
      box-shadow: 0 4px 11px rgba(0,0,0,.25);
      cursor: grab;
      transition: transform .16s, opacity .16s, border-color .16s;
    }

    .event-card:hover {
      transform: translateY(-2px);
      border-color: #f07868;
    }

    .event-card:active { cursor: grabbing; }
    .event-card.dragging { opacity: .38; transform: scale(.96); }
    .event-card .icon { flex: 0 0 auto; font-size: 1.35rem; }
    .event-card .event-text { font-size: .9rem; line-height: 1.45; }

    .event-card.matched {
      min-height: 34px;
      flex: 0 1 auto;
      padding: 5px 8px;
      border-color: #559f72;
      border-left-width: 3px;
      color: #e9f8ee;
      background: #286142;
      box-shadow: none;
      cursor: default;
      animation: correct-in .35s cubic-bezier(.25,.8,.25,1);
    }

    .event-card.matched:hover { transform: none; border-color: #559f72; }
    .event-card.matched .icon { font-size: .85rem; }
    .event-card.matched .event-text { font-size: .68rem; }

    .event-card.wrong {
      animation: wrong-flash .3s ease;
    }

    .drop-zone.has-cards .drop-hint { display: none; }

    .finish {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      background: rgba(10,7,5,.84);
      backdrop-filter: blur(8px);
      transition: opacity .3s, visibility .3s;
    }

    .finish.show { opacity: 1; visibility: visible; }

    .finish-card {
      position: relative;
      width: min(470px, 100%);
      padding: 45px 30px;
      border: 2px solid var(--gold-light);
      text-align: center;
      background: #1d1510;
      box-shadow: 0 0 35px rgba(242,214,129,.42);
      animation: golden-pulse 1.2s ease-in-out infinite alternate;
    }

    .finish-card::before, .finish-card::after {
      content: "◆";
      position: absolute;
      top: 14px;
      color: var(--gold);
    }
    .finish-card::before { left: 16px; }
    .finish-card::after { right: 16px; }

    .finish-icon { font-size: 3rem; }
    .finish h2 { margin: 8px 0; color: var(--gold-light); font-size: 2.2rem; letter-spacing: .12em; }
    .finish p { margin: 0 0 24px; color: var(--muted); }
    .finish b { color: var(--text); font-size: 1.25rem; }

    .restart {
      border: 1px solid var(--gold-light);
      padding: 10px 28px;
      color: #241609;
      background: var(--gold-light);
      cursor: pointer;
      font-weight: 900;
      letter-spacing: .12em;
    }
    .restart:hover { filter: brightness(1.08); }

    @keyframes wrong-flash {
      0%, 100% { transform: translateX(0); background: #251713; }
      25% { transform: translateX(-6px); background: #8f2525; }
      65% { transform: translateX(6px); background: #b6312d; box-shadow: 0 0 22px rgba(224,90,79,.65); }
    }

    @keyframes correct-in {
      from { transform: scale(1.12); background: #3fa067; }
      to { transform: scale(1); }
    }

    @keyframes score-pop {
      50% { transform: scale(1.35); }
    }

    @keyframes golden-pulse {
      to { box-shadow: 0 0 70px rgba(242,214,129,.72), inset 0 0 25px rgba(202,163,75,.12); }
    }

    @media (max-width: 980px) {
      .app { width: min(760px, calc(100% - 28px)); }
      header { align-items: start; flex-direction: column; }
      .instructions { text-align: left; }
      .layout { grid-template-columns: 1fr; }
      .right-panel { position: static; }
      .event-pool {
        min-height: 0;
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x proximity;
        padding-bottom: 20px;
      }
      .event-card:not(.matched) {
        flex: 0 0 min(275px, 78vw);
        scroll-snap-align: start;
      }
    }

    @media (max-width: 560px) {
      .app { width: min(100% - 20px, 500px); padding-top: 22px; }
      .dynasty-grid { grid-template-columns: 1fr; }
      .dynasty { min-height: 174px; }
      .drop-zone { min-height: 96px; }
      .scoreboard { grid-template-columns: 1fr 1fr; }
      .progress-wrap { grid-column: 1 / -1; min-height: 50px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <a class="map-back" href="../大冒險地圖/index.html">← 回到大地圖</a>
  <main class="app">
    <header>
      <div>
        <div class="kicker">中國歷史・配對練習</div>
        <h1>朝代配對</h1>
      </div>
      <p class="instructions">將右側的歷史事件拖到正確朝代。答對得一分，答錯扣一分；試著用最少的嘗試完成挑戰。</p>
    </header>

    <div class="layout">
      <section aria-labelledby="dynasty-heading">
        <h2 class="section-label" id="dynasty-heading">朝代紀年</h2>
        <div class="dynasty-grid" id="dynasty-grid"></div>
      </section>

      <aside class="right-panel" aria-labelledby="events-heading">
        <div class="scoreboard" aria-label="遊戲統計">
          <div class="metric"><span>目前得分</span><strong id="score">0</strong></div>
          <div class="metric"><span>嘗試次數</span><strong id="attempts">0</strong></div>
          <div class="progress-wrap">
            <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
            <span class="progress-text" id="progress-text">0 / 16</span>
          </div>
        </div>
        <h2 class="section-label" id="events-heading">歷史事件</h2>
        <div class="event-pool" id="event-pool" aria-label="待配對事件卡"></div>
      </aside>
    </div>
  </main>

  <div class="finish" id="finish" role="dialog" aria-modal="true" aria-labelledby="finish-title">
    <div class="finish-card">
      <div class="finish-icon">🏆</div>
      <h2 id="finish-title">配對完成</h2>
      <p>你完成了全部歷史事件！<br>總共嘗試 <b id="final-attempts">0</b> 次，得分 <b id="final-score">0</b> 分。</p>
      <button class="restart" id="restart" type="button">再玩一次</button>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const dynasties = [
        { id: 1, name: "秦" },
        { id: 2, name: "漢" },
        { id: 3, name: "唐" },
        { id: 4, name: "宋" },
        { id: 5, name: "明" },
        { id: 6, name: "清" }
      ];

      const events = [
        { id: "e1", dynasty_id: 1, text: "統一六國", icon: "⚔️" },
        { id: "e2", dynasty_id: 1, text: "修築萬里長城", icon: "🧱" },
        { id: "e3", dynasty_id: 1, text: "焚書坑儒", icon: "🔥" },
        { id: "e4", dynasty_id: 2, text: "張騫通西域", icon: "🐪" },
        { id: "e5", dynasty_id: 2, text: "文景之治", icon: "📜" },
        { id: "e6", dynasty_id: 2, text: "罷黜百家獨尊儒術", icon: "📖" },
        { id: "e7", dynasty_id: 3, text: "貞觀之治", icon: "👑" },
        { id: "e8", dynasty_id: 3, text: "安史之亂", icon: "💥" },
        { id: "e9", dynasty_id: 3, text: "玄奘西行取經", icon: "🧘" },
        { id: "e10", dynasty_id: 4, text: "王安石變法", icon: "📜" },
        { id: "e11", dynasty_id: 4, text: "岳飛抗金", icon: "🗡️" },
        { id: "e12", dynasty_id: 5, text: "鄭和下西洋", icon: "⛵" },
        { id: "e13", dynasty_id: 5, text: "永樂大典編成", icon: "📚" },
        { id: "e14", dynasty_id: 6, text: "鴉片戰爭", icon: "💣" },
        { id: "e15", dynasty_id: 6, text: "康熙盛世", icon: "🌅" },
        { id: "e16", dynasty_id: 6, text: "辛亥革命終結", icon: "🏛️" }
      ];

      const dynastyGrid = document.querySelector("#dynasty-grid");
      const eventPool = document.querySelector("#event-pool");
      const scoreEl = document.querySelector("#score");
      const attemptsEl = document.querySelector("#attempts");
      const progressBar = document.querySelector("#progress-bar");
      const progressText = document.querySelector("#progress-text");
      const finishEl = document.querySelector("#finish");
      const finalAttempts = document.querySelector("#final-attempts");
      const finalScore = document.querySelector("#final-score");
      const restart = document.querySelector("#restart");

      let score = 0;
      let attempts = 0;
      let matched = 0;
      let draggedId = null;

      function shuffle(items) {
        const copy = [...items];
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function makeEventCard(event) {
        const card = document.createElement("article");
        card.className = "event-card";
        card.id = event.id;
        card.draggable = true;
        card.dataset.dynastyId = event.dynasty_id;
        card.innerHTML = `<span class="icon" aria-hidden="true">${event.icon}</span><span class="event-text">${event.text}</span>`;
        card.setAttribute("aria-label", `${event.text}，可拖曳配對`);

        card.addEventListener("dragstart", e => {
          draggedId = event.id;
          e.dataTransfer.setData("text/plain", event.id);
          e.dataTransfer.effectAllowed = "move";
          requestAnimationFrame(() => card.classList.add("dragging"));
        });
        card.addEventListener("dragend", () => {
          card.classList.remove("dragging");
          document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
          draggedId = null;
        });
        return card;
      }

      function setupGame() {
        score = 0;
        attempts = 0;
        matched = 0;
        draggedId = null;
        scoreEl.textContent = "0";
        scoreEl.classList.remove("negative");
        attemptsEl.textContent = "0";
        progressBar.style.width = "0%";
        progressText.textContent = `0 / ${events.length}`;
        finishEl.classList.remove("show");
        dynastyGrid.replaceChildren();
        eventPool.replaceChildren();

        dynasties.forEach(dynasty => {
          const box = document.createElement("article");
          box.className = "dynasty";
          box.dataset.dynastyId = dynasty.id;
          box.innerHTML = `
            <div class="dynasty-name">${dynasty.name}</div>
            <div class="drop-zone" aria-label="${dynasty.name}朝事件掉落區">
              <div class="drop-hint">將事件拖放至此</div>
            </div>`;

          box.addEventListener("dragover", e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            box.classList.add("drag-over");
          });
          box.addEventListener("dragleave", e => {
            if (!box.contains(e.relatedTarget)) box.classList.remove("drag-over");
          });
          box.addEventListener("drop", e => {
            e.preventDefault();
            box.classList.remove("drag-over");
            const eventId = e.dataTransfer.getData("text/plain") || draggedId;
            checkMatch(eventId, dynasty.id, box.querySelector(".drop-zone"));
          });
          dynastyGrid.append(box);
        });

        shuffle(events).forEach(event => eventPool.append(makeEventCard(event)));
      }

      function checkMatch(eventId, dynastyId, dropZone) {
        const event = events.find(item => item.id === eventId);
        const card = document.getElementById(eventId);
        if (!event || !card || card.classList.contains("matched")) return;

        attempts++;
        attemptsEl.textContent = attempts;

        if (event.dynasty_id === Number(dynastyId)) {
          score++;
          matched++;
          card.classList.remove("dragging", "wrong");
          card.classList.add("matched");
          card.draggable = false;
          card.removeAttribute("aria-label");
          dropZone.append(card);
          dropZone.classList.add("has-cards");
          updateScore();
          updateProgress();
          if (matched === events.length) {
            setTimeout(showFinish, 450);
          }
        } else {
          score--;
          updateScore();
          card.classList.remove("wrong");
          void card.offsetWidth;
          card.classList.add("wrong");
          setTimeout(() => card.classList.remove("wrong"), 300);
        }
      }

      function updateScore() {
        scoreEl.textContent = score;
        scoreEl.classList.toggle("negative", score < 0);
        scoreEl.classList.remove("pop");
        void scoreEl.offsetWidth;
        scoreEl.classList.add("pop");
      }

      function updateProgress() {
        progressBar.style.width = `${matched / events.length * 100}%`;
        progressText.textContent = `${matched} / ${events.length}`;
      }

      function showFinish() {
        localStorage.setItem("cert_dynasty", "true");
        finalAttempts.textContent = attempts;
        finalScore.textContent = score;
        finishEl.classList.add("show");
        restart.focus();
      }

      restart.addEventListener("click", setupGame);
      setupGame();
    })();
  </script>
</body>
</html>
