<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="三關教學遊戲大冒險入口地圖">
  <title>大冒險地圖</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101529;
      --panel: #1c2440;
      --panel-2: #252f50;
      --line: #3b4870;
      --text: #f5f6ff;
      --muted: #a9b1ce;
      --gold: #ffd45e;
      --cyan: #5edbe6;
      --green: #5bd58a;
      --red: #ff6276;
      --purple: #a887ff;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Microsoft JhengHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 18% 10%, rgba(168,135,255,.18), transparent 28rem),
        radial-gradient(circle at 88% 80%, rgba(94,219,230,.12), transparent 30rem),
        var(--bg);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .2;
      background-image: radial-gradient(circle, #fff 0 1px, transparent 1.5px);
      background-size: 38px 38px;
      mask-image: linear-gradient(#000, transparent 80%);
    }

    button, a { font: inherit; }

    .app {
      position: relative;
      width: min(1100px, calc(100% - 32px));
      min-height: 100vh;
      margin: auto;
      padding: 34px 0 55px;
    }

    header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 25px;
      margin-bottom: 54px;
    }

    .eyebrow { color: var(--cyan); font-size: .75rem; font-weight: 800; letter-spacing: .2em; }
    h1 { margin: 5px 0 8px; font-size: clamp(2.3rem, 7vw, 4.6rem); line-height: 1; letter-spacing: -.04em; }
    .lead { margin: 0; color: var(--muted); font-size: clamp(.9rem, 2vw, 1.08rem); }

    .reset {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 14px;
      color: var(--muted);
      background: rgba(28,36,64,.72);
      cursor: pointer;
    }
    .reset:hover { color: var(--text); border-color: var(--red); }

    .journey {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      margin: 0 0 52px;
    }

    .journey::before {
      content: "";
      position: absolute;
      z-index: -1;
      top: 50%;
      left: 10%;
      right: 10%;
      border-top: 3px dashed rgba(94,219,230,.2);
    }

    .level {
      position: relative;
      min-height: 285px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 27px 20px;
      border: 1px solid var(--line);
      border-radius: 20px;
      color: var(--text);
      background: linear-gradient(145deg, rgba(39,48,82,.96), rgba(25,32,58,.96));
      box-shadow: 0 18px 40px rgba(0,0,0,.25);
      text-align: center;
      text-decoration: none;
      transition: transform .2s, border-color .2s, box-shadow .2s;
    }

    .level:hover { transform: translateY(-8px); border-color: var(--cyan); box-shadow: 0 24px 48px rgba(0,0,0,.32); }
    .level-number {
      position: absolute;
      top: 15px; left: 17px;
      color: var(--muted);
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .1em;
    }
    .level-icon {
      width: 104px;
      height: 104px;
      display: grid;
      place-items: center;
      margin-bottom: 17px;
      border-radius: 50%;
      font-size: 3.7rem;
      background: rgba(12,16,32,.4);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }
    .level h2 { margin: 0 0 10px; font-size: 1.35rem; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      border-radius: 99px;
      color: var(--muted);
      background: rgba(8,11,24,.45);
      font-size: .76rem;
    }
    .level.complete { border-color: rgba(91,213,138,.65); background: linear-gradient(145deg, rgba(37,91,69,.95), rgba(24,53,46,.96)); }
    .level.complete .status { color: #d8ffe6; background: rgba(91,213,138,.16); }
    .level.complete .level-icon { box-shadow: 0 0 35px rgba(91,213,138,.26), inset 0 0 0 1px rgba(91,213,138,.28); }

    .gate-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 25px;
      border: 1px solid rgba(255,212,94,.25);
      border-radius: 18px;
      background: rgba(55,43,23,.3);
    }
    .gate {
      border: 1px solid var(--gold);
      border-radius: 11px;
      padding: 13px 25px;
      color: #251c08;
      background: var(--gold);
      cursor: pointer;
      font-weight: 900;
      box-shadow: 0 8px 24px rgba(255,212,94,.15);
    }
    .gate:hover { transform: translateY(-2px); filter: brightness(1.08); }
    .count { color: var(--muted); }
    .count b { color: var(--gold); font-size: 1.25rem; }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
      opacity: 0;
      visibility: hidden;
      background: rgba(7,9,18,.82);
      backdrop-filter: blur(9px);
      transition: opacity .25s, visibility .25s;
    }
    .overlay.show { opacity: 1; visibility: visible; }

    .modal {
      position: relative;
      width: min(760px, 100%);
      max-height: 94vh;
      overflow: auto;
      padding: clamp(22px, 5vw, 40px);
      border: 1px solid var(--gold);
      border-radius: 20px;
      background:
        radial-gradient(circle at 50% 0, rgba(255,212,94,.09), transparent 18rem),
        var(--panel);
      box-shadow: 0 30px 90px rgba(0,0,0,.55);
      text-align: center;
    }
    .close {
      position: absolute;
      top: 13px; right: 13px;
      width: 37px; height: 37px;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--muted);
      background: var(--panel-2);
      cursor: pointer;
    }
    .modal h2 { margin: 0 0 6px; font-size: clamp(1.65rem, 5vw, 2.4rem); }
    .modal-desc { margin: 0 0 27px; color: var(--muted); }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 13px;
      margin-bottom: 27px;
    }
    .slot {
      min-height: 140px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 8px;
      border: 2px dashed #59627e;
      border-radius: 15px;
      color: var(--muted);
      background: rgba(10,13,27,.45);
      transition: .18s;
    }
    .slot::before { content: "◇"; font-size: 2.3rem; opacity: .4; }
    .slot.drag-over { border-color: var(--gold); transform: scale(1.03); background: rgba(255,212,94,.08); }
    .slot.filled { border: 2px solid var(--green); color: #dfffea; background: rgba(91,213,138,.14); }
    .slot.filled::before { content: "✓"; color: var(--green); opacity: 1; }
    .slot.wrong { animation: wrong .3s; }
    .slot-label { font-size: .82rem; font-weight: 800; }

    .bag {
      min-height: 140px;
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(12,16,31,.55);
    }
    .bag-title { margin-bottom: 13px; color: var(--muted); font-size: .76rem; letter-spacing: .13em; }
    .badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 11px; }
    .badge {
      min-width: 145px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 11px 13px;
      border: 1px solid var(--purple);
      border-radius: 10px;
      color: #ece7ff;
      background: linear-gradient(135deg, #43376d, #2d2850);
      cursor: grab;
      touch-action: none;
      font-weight: 800;
      box-shadow: 0 5px 13px rgba(0,0,0,.25);
    }
    .badge.dragging { opacity: .25; }
    .badge.placed { display: none; }
    .empty-bag { color: var(--muted); font-size: .85rem; }
    .hint { min-height: 24px; margin: 15px 0 0; color: var(--muted); font-size: .82rem; }

    .drag-ghost {
      position: fixed;
      z-index: 50;
      transform: translate(-50%,-75%) rotate(3deg);
      pointer-events: none;
      padding: 11px 14px;
      border: 2px solid var(--gold);
      border-radius: 10px;
      color: white;
      background: #43376d;
      box-shadow: 0 12px 28px rgba(0,0,0,.35);
      font-weight: 800;
    }

    .victory { display: none; padding: 20px 0 5px; }
    .modal.complete-view .gate-game { display: none; }
    .modal.complete-view .victory { display: block; animation: victory-in .5s ease; }
    .trophy { font-size: 5rem; filter: drop-shadow(0 0 25px rgba(255,212,94,.5)); }
    .duration { margin: 20px 0 27px; color: var(--muted); }
    .duration b { display: block; margin-top: 5px; color: var(--cyan); font-size: 1.7rem; }
    .again {
      border: 0;
      border-radius: 10px;
      padding: 11px 23px;
      color: #201704;
      background: var(--gold);
      cursor: pointer;
      font-weight: 900;
    }

    @keyframes wrong {
      0%,100% { transform: translateX(0); background: rgba(10,13,27,.45); }
      25%,75% { transform: translateX(-6px); border-color: var(--red); background: rgba(255,98,118,.22); }
      50% { transform: translateX(6px); }
    }
    @keyframes victory-in { from { transform: scale(.85); opacity: 0; } }

    @media (max-width: 740px) {
      header { flex-direction: column-reverse; margin-bottom: 32px; }
      .reset { align-self: flex-end; }
      .journey { grid-template-columns: 1fr; }
      .journey::before { top: 8%; bottom: 8%; left: 50%; right: auto; border-top: 0; border-left: 3px dashed rgba(94,219,230,.2); }
      .level { min-height: 220px; }
      .level-icon { width: 82px; height: 82px; font-size: 3rem; }
      .slots { grid-template-columns: 1fr; }
      .slot { min-height: 85px; grid-template-columns: auto auto; }
      .slot::before { font-size: 1.7rem; }
      .gate-section { flex-direction: column; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,*::before,*::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <div class="eyebrow">LEARNING ADVENTURE</div>
        <h1>大冒險地圖</h1>
        <p class="lead">完成 3 個關卡，拿到 3 個憑證解開大門</p>
      </div>
      <button class="reset" id="reset" type="button">🔄 清除進度</button>
    </header>

    <section class="journey" aria-label="冒險關卡">
      <a class="level" data-cert="cert_dynasty" href="../示範1_朝代配對/index.html">
        <span class="level-number">STAGE 01</span><span class="level-icon">🎴</span>
        <h2>朝代配對</h2><span class="status">未完成</span>
      </a>
      <a class="level" data-cert="cert_idiom" href="../示範2_成語填字/index.html">
        <span class="level-number">STAGE 02</span><span class="level-icon">📝</span>
        <h2>成語填字</h2><span class="status">未完成</span>
      </a>
      <a class="level" data-cert="cert_warrior" href="../示範3_打怪RPG/index.html">
        <span class="level-number">STAGE 03</span><span class="level-icon">⚔️</span>
        <h2>打怪 RPG</h2><span class="status">未完成</span>
      </a>
    </section>

    <section class="gate-section">
      <button class="gate" id="open-gate" type="button">🔒 通關大門</button>
      <span class="count">目前持有：<b id="cert-count">0 / 3</b></span>
    </section>
  </main>

  <div class="overlay" id="gate-modal" role="dialog" aria-modal="true" aria-labelledby="gate-title">
    <div class="modal" id="modal-card">
      <button class="close" id="close-modal" type="button" aria-label="關閉">×</button>
      <div class="gate-game">
        <h2 id="gate-title">🔒 憑證之門</h2>
        <p class="modal-desc">將背包中的三枚憑證拖到正確凹槽，解開最後的大門。</p>
        <div class="slots">
          <div class="slot" data-accept="cert_dynasty"><span class="slot-label">朝代</span></div>
          <div class="slot" data-accept="cert_idiom"><span class="slot-label">成語</span></div>
          <div class="slot" data-accept="cert_warrior"><span class="slot-label">勇者</span></div>
        </div>
        <div class="bag">
          <div class="bag-title">🎒 憑證背包</div>
          <div class="badges" id="badges"></div>
        </div>
        <p class="hint" id="hint">把已取得的憑證拖到上方凹槽</p>
      </div>
      <div class="victory">
        <div class="trophy">🏆</div>
        <h2>冒險完成！</h2>
        <p class="duration">總冒險時長<b id="duration">00 分 00 秒</b></p>
        <button class="again" id="again" type="button">再次冒險</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const CERTS = [
        { key: "cert_dynasty", icon: "🎴", name: "朝代之印" },
        { key: "cert_idiom", icon: "📝", name: "成語之印" },
        { key: "cert_warrior", icon: "⚔️", name: "勇者之印" }
      ];
      const modal = document.querySelector("#gate-modal");
      const modalCard = document.querySelector("#modal-card");
      const badgesEl = document.querySelector("#badges");
      const hint = document.querySelector("#hint");
      let placed = new Set();
      let draggedBadge = null;
      let ghost = null;

      function hasCert(key) {
        const value = localStorage.getItem(key);
        return value !== null && value !== "false" && value !== "0";
      }

      function refreshMap() {
        if (!localStorage.getItem("adventure_start")) {
          localStorage.setItem("adventure_start", String(Date.now()));
        }
        let count = 0;
        document.querySelectorAll(".level").forEach(level => {
          const complete = hasCert(level.dataset.cert);
          level.classList.toggle("complete", complete);
          level.querySelector(".status").textContent = complete ? "已完成 ✓" : "未完成";
          if (complete) count++;
        });
        document.querySelector("#cert-count").textContent = `${count} / 3`;
      }

      function openGate() {
        placed = new Set();
        modalCard.classList.remove("complete-view");
        document.querySelectorAll(".slot").forEach(slot => slot.classList.remove("filled","wrong","drag-over"));
        buildBadges();
        hint.textContent = "把已取得的憑證拖到上方凹槽";
        modal.classList.add("show");
        document.querySelector("#close-modal").focus();
      }

      function buildBadges() {
        badgesEl.replaceChildren();
        CERTS.filter(cert => hasCert(cert.key)).forEach(cert => {
          const badge = document.createElement("div");
          badge.className = "badge";
          badge.draggable = true;
          badge.dataset.cert = cert.key;
          badge.innerHTML = `<span>${cert.icon}</span><span>${cert.name}</span>`;
          badge.addEventListener("dragstart", event => {
            draggedBadge = badge;
            event.dataTransfer.setData("text/plain", cert.key);
            event.dataTransfer.effectAllowed = "move";
            requestAnimationFrame(() => badge.classList.add("dragging"));
          });
          badge.addEventListener("dragend", () => {
            badge.classList.remove("dragging");
            draggedBadge = null;
            document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
          });
          badge.addEventListener("pointerdown", startTouchDrag);
          badgesEl.append(badge);
        });
        if (!badgesEl.children.length) {
          badgesEl.innerHTML = '<span class="empty-bag">背包還是空的，先去完成一個關卡吧！</span>';
        }
      }

      function placeBadge(badge, slot) {
        if (!badge || !slot || badge.classList.contains("placed")) return;
        if (badge.dataset.cert === slot.dataset.accept) {
          slot.classList.add("filled");
          badge.classList.add("placed");
          placed.add(badge.dataset.cert);
          hint.textContent = `已放入 ${placed.size} / 3 枚憑證`;
          if (placed.size === 3) setTimeout(showVictory, 450);
        } else {
          slot.classList.remove("wrong");
          void slot.offsetWidth;
          slot.classList.add("wrong");
          hint.textContent = "這枚憑證不屬於這個凹槽，再試一次！";
          setTimeout(() => slot.classList.remove("wrong"), 300);
        }
      }

      document.querySelectorAll(".slot").forEach(slot => {
        slot.addEventListener("dragover", event => {
          if (slot.classList.contains("filled")) return;
          event.preventDefault();
          event.dataTransfer.dropEffect = "move";
          slot.classList.add("drag-over");
        });
        slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
        slot.addEventListener("drop", event => {
          event.preventDefault();
          slot.classList.remove("drag-over");
          const key = event.dataTransfer.getData("text/plain");
          const badge = [...badgesEl.querySelectorAll(".badge")].find(item => item.dataset.cert === key) || draggedBadge;
          placeBadge(badge, slot);
        });
      });

      function startTouchDrag(event) {
        if (event.pointerType === "mouse") return;
        const badge = event.currentTarget;
        event.preventDefault();
        draggedBadge = badge;
        badge.classList.add("dragging");
        badge.setPointerCapture(event.pointerId);
        ghost = document.createElement("div");
        ghost.className = "drag-ghost";
        ghost.textContent = badge.textContent;
        document.body.append(ghost);
        moveTouch(event);
        badge.addEventListener("pointermove", moveTouch);
        badge.addEventListener("pointerup", endTouch, { once: true });
        badge.addEventListener("pointercancel", endTouch, { once: true });
      }

      function moveTouch(event) {
        if (!ghost) return;
        ghost.style.left = `${event.clientX}px`;
        ghost.style.top = `${event.clientY}px`;
        ghost.hidden = true;
        const target = document.elementFromPoint(event.clientX, event.clientY)?.closest(".slot:not(.filled)");
        ghost.hidden = false;
        document.querySelectorAll(".slot.drag-over").forEach(slot => slot.classList.remove("drag-over"));
        target?.classList.add("drag-over");
      }

      function endTouch(event) {
        const badge = event.currentTarget;
        badge.removeEventListener("pointermove", moveTouch);
        ghost?.remove();
        ghost = null;
        badge.classList.remove("dragging");
        const slot = document.elementFromPoint(event.clientX, event.clientY)?.closest(".slot:not(.filled)");
        document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
        placeBadge(badge, slot);
        draggedBadge = null;
      }

      function showVictory() {
        const started = Number(localStorage.getItem("adventure_start")) || Date.now();
        const totalSeconds = Math.max(0, Math.floor((Date.now() - started) / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        document.querySelector("#duration").textContent = `${String(minutes).padStart(2,"0")} 分 ${String(seconds).padStart(2,"0")} 秒`;
        modalCard.classList.add("complete-view");
      }

      function clearAndRestart() {
        localStorage.clear();
        location.reload();
      }

      document.querySelector("#open-gate").addEventListener("click", openGate);
      document.querySelector("#close-modal").addEventListener("click", () => modal.classList.remove("show"));
      modal.addEventListener("click", event => { if (event.target === modal) modal.classList.remove("show"); });
      document.addEventListener("keydown", event => { if (event.key === "Escape") modal.classList.remove("show"); });
      document.querySelector("#reset").addEventListener("click", clearAndRestart);
      document.querySelector("#again").addEventListener("click", clearAndRestart);
      window.addEventListener("pageshow", refreshMap);
      refreshMap();
    })();
  </script>
</body>
</html>
