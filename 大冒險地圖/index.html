<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大冒險地圖</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: #151b30;
      --panel-2: #222b49;
      --line: #465276;
      --text: #f7f6ef;
      --muted: #aeb5cd;
      --gold: #ffd35c;
      --green: #55d487;
      --red: #ff6376;
      --purple: #9f83ff;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: #090d18;
      font-family: "Microsoft JhengHei", system-ui, sans-serif;
    }
    button { font: inherit; }
    .hidden { display: none !important; }

    .cover-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #080b14;
      cursor: pointer;
      transition: opacity .75s ease, visibility .75s;
    }
    .cover-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .cover-screen img { width: 100%; height: 100%; object-fit: cover; }
    .cover-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 3px solid rgba(255,211,92,.24);
      pointer-events: none;
    }

    .map-page {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 10px;
      background: radial-gradient(circle, #18223c, #080b13 72%);
    }
    .map-stage {
      position: relative;
      width: min(calc(100vw - 20px), calc((100vh - 20px) * 16 / 9));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      box-shadow: 0 20px 70px rgba(0,0,0,.55);
    }
    .map-stage > img {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .info {
      position: fixed;
      z-index: 20;
      top: 14px;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 9px 8px 14px;
      border: 1px solid rgba(255,211,92,.55);
      border-radius: 12px;
      color: #fff2bf;
      background: rgba(11,15,27,.88);
      box-shadow: 0 5px 20px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
      font-weight: 800;
    }
    .info b { color: var(--gold); }
    .reset {
      border: 1px solid #59627b;
      border-radius: 8px;
      padding: 6px 10px;
      color: #e7e9f2;
      background: #27304b;
      cursor: pointer;
    }
    .reset:hover { border-color: var(--red); }

    .hotspot {
      position: absolute;
      z-index: 5;
      border: 0;
      border-radius: 9px;
      background: transparent;
      cursor: pointer;
      transition: background .18s, box-shadow .18s, filter .18s;
    }
    .hotspot:hover, .hotspot:focus-visible {
      outline: none;
      background: rgba(255,244,176,.13);
      box-shadow: 0 0 20px 8px rgba(255,228,112,.38), inset 0 0 16px rgba(255,255,255,.22);
      filter: brightness(1.1);
    }
    .hotspot-dynasty { left: 8.8%; top: 34.1%; width: 19.7%; height: 9.4%; }
    .hotspot-idiom { left: 69.5%; top: 34.1%; width: 19.9%; height: 9.4%; }
    .hotspot-warrior { left: 6.0%; top: 82.5%; width: 20.3%; height: 9.1%; }
    .hotspot-gate { left: 40.5%; top: 56.4%; width: 20.5%; height: 14.8%; }

    .stamp {
      position: absolute;
      z-index: 7;
      top: -34%;
      right: -2%;
      width: clamp(24px, 3.1vw, 48px);
      aspect-ratio: 1;
      display: none;
      place-items: center;
      border: 3px solid #e4ffeb;
      border-radius: 50%;
      color: white;
      background: #259457;
      box-shadow: 0 3px 10px rgba(0,0,0,.45), 0 0 15px rgba(85,212,135,.65);
      font-size: clamp(.85rem, 2vw, 1.6rem);
      font-weight: 1000;
      transform: rotate(-12deg);
      pointer-events: none;
    }
    .hotspot.complete .stamp { display: grid; animation: stamp-in .4s cubic-bezier(.2,.9,.3,1.3); }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 16px;
      opacity: 0;
      visibility: hidden;
      background: rgba(4,7,14,.84);
      backdrop-filter: blur(8px);
      transition: opacity .25s, visibility .25s;
    }
    .overlay.show { opacity: 1; visibility: visible; }
    .modal {
      position: relative;
      width: min(760px, 100%);
      max-height: 94vh;
      overflow: auto;
      padding: clamp(22px, 5vw, 40px);
      border: 1px solid var(--gold);
      border-radius: 18px;
      text-align: center;
      background: radial-gradient(circle at 50% 0, rgba(255,211,92,.09), transparent 18rem), var(--panel);
      box-shadow: 0 30px 90px rgba(0,0,0,.6);
    }
    .close {
      position: absolute;
      top: 12px; right: 12px;
      width: 38px; height: 38px;
      border: 1px solid var(--line);
      border-radius: 50%;
      color: var(--muted);
      background: var(--panel-2);
      cursor: pointer;
    }
    .modal h2 { margin: 0 0 7px; font-size: clamp(1.6rem, 5vw, 2.35rem); }
    .desc { margin: 0 0 24px; color: var(--muted); }
    .slots { display: grid; grid-template-columns: repeat(3,1fr); gap: 13px; margin-bottom: 25px; }
    .slot {
      min-height: 130px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 7px;
      border: 2px dashed #5a6585;
      border-radius: 14px;
      color: var(--muted);
      background: rgba(7,10,21,.48);
      transition: .16s;
    }
    .slot::before { content: "◇"; font-size: 2.2rem; opacity: .42; }
    .slot.drag-over { border-color: var(--gold); transform: scale(1.03); background: rgba(255,211,92,.09); }
    .slot.filled { border: 2px solid var(--green); color: #e1ffeb; background: rgba(85,212,135,.14); }
    .slot.filled::before { content: "✓"; color: var(--green); opacity: 1; }
    .slot.wrong { animation: wrong .3s; }
    .slot-label { font-size: .84rem; font-weight: 900; }

    .bag {
      min-height: 130px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(8,11,23,.52);
    }
    .bag-title { margin-bottom: 13px; color: var(--muted); font-size: .76rem; letter-spacing: .12em; }
    .badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    .badge {
      min-width: 145px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 11px 13px;
      border: 1px solid var(--purple);
      border-radius: 9px;
      color: #eeeaff;
      background: linear-gradient(135deg,#463a72,#2c284d);
      box-shadow: 0 5px 13px rgba(0,0,0,.27);
      cursor: grab;
      touch-action: none;
      font-weight: 800;
    }
    .badge.dragging { opacity: .25; }
    .badge.placed { display: none; }
    .empty { color: var(--muted); font-size: .86rem; }
    .hint { min-height: 22px; margin: 14px 0 0; color: var(--muted); font-size: .82rem; }
    .drag-ghost {
      position: fixed;
      z-index: 60;
      transform: translate(-50%,-75%) rotate(3deg);
      padding: 11px 14px;
      border: 2px solid var(--gold);
      border-radius: 9px;
      color: white;
      background: #463a72;
      box-shadow: 0 12px 28px rgba(0,0,0,.4);
      pointer-events: none;
      font-weight: 800;
    }

    .victory { display: none; padding: 18px 0 4px; }
    .modal.victory-mode .gate-game { display: none; }
    .modal.victory-mode .victory { display: block; animation: victory .5s ease; }
    .trophy { font-size: 5rem; filter: drop-shadow(0 0 25px rgba(255,211,92,.55)); }
    .duration { margin: 18px 0 25px; color: var(--muted); }
    .duration b { display: block; margin-top: 5px; color: #63dce6; font-size: 1.65rem; }
    .again {
      border: 0;
      border-radius: 9px;
      padding: 11px 23px;
      color: #241b07;
      background: var(--gold);
      cursor: pointer;
      font-weight: 900;
    }

    .cutscene {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      overflow: hidden;
      color: white;
      background: #03050b;
      cursor: pointer;
    }
    .cutscene.show { display: block; animation: scene-fade .7s ease; }
    .scene-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      transition: opacity .42s ease, transform 7s linear;
    }
    .cutscene.changing .scene-image { opacity: 0; }
    .cutscene.show .scene-image { transform: scale(1.035); }
    .scene-shade {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(3,5,11,.22), transparent 35%, rgba(3,5,11,.3) 58%, rgba(3,5,11,.94));
      pointer-events: none;
    }
    .ending-title {
      position: absolute;
      z-index: 2;
      top: clamp(18px, 5vh, 50px);
      left: 50%;
      padding: 12px 25px;
      color: #ffe77f;
      text-align: center;
      text-shadow: 3px 3px #571e18, 0 0 18px rgba(255,211,92,.65);
      font-size: clamp(1.1rem, 3.2vw, 2rem);
      font-weight: 1000;
      line-height: 1.45;
      letter-spacing: .08em;
      transform: translateX(-50%);
      white-space: nowrap;
    }
    .narration {
      position: absolute;
      z-index: 2;
      left: 50%;
      bottom: clamp(32px, 7vh, 72px);
      width: min(900px, calc(100% - 34px));
      padding: clamp(15px, 3vw, 24px);
      border: 2px solid rgba(255,211,92,.72);
      border-radius: 8px;
      background: rgba(5,8,17,.83);
      box-shadow: 0 12px 35px rgba(0,0,0,.5);
      text-align: center;
      transform: translateX(-50%);
    }
    .narration p {
      margin: 4px 0;
      font-size: clamp(.95rem, 2.4vw, 1.35rem);
      font-weight: 700;
      line-height: 1.7;
      text-shadow: 2px 2px #000;
    }
    .scene-meta {
      margin-top: 10px;
      color: #c5cbe0;
      font-size: .72rem;
      letter-spacing: .12em;
    }
    .final-card {
      position: absolute;
      z-index: 4;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      visibility: hidden;
      background: rgba(3,5,11,.67);
      text-align: center;
      transition: opacity 1.4s ease, visibility 1.4s;
    }
    .cutscene.final .narration, .cutscene.final .ending-title { opacity: 0; transition: opacity .7s; }
    .cutscene.final .final-card { opacity: 1; visibility: visible; }
    .final-card h2 {
      margin: 0;
      color: #ffe77f;
      font-size: clamp(2rem, 7vw, 4.7rem);
      line-height: 1.45;
      text-shadow: 4px 4px #62251e, 0 0 30px rgba(255,211,92,.7);
    }
    .final-card p {
      margin: 24px 0 0;
      color: #f5f0dc;
      font-size: clamp(.9rem, 2.5vw, 1.35rem);
      line-height: 1.8;
    }

    @keyframes stamp-in { from { opacity: 0; transform: scale(1.7) rotate(-25deg); } }
    @keyframes wrong {
      0%,100% { transform: translateX(0); background: rgba(7,10,21,.48); }
      25%,75% { transform: translateX(-6px); border-color: var(--red); background: rgba(255,99,118,.22); }
      50% { transform: translateX(6px); }
    }
    @keyframes victory { from { transform: scale(.85); opacity: 0; } }
    @keyframes scene-fade { from { opacity: 0; } }

    @media (max-width: 650px) {
      .info { top: 7px; right: 7px; gap: 5px; padding: 5px 5px 5px 9px; font-size: .75rem; }
      .reset { padding: 5px 7px; font-size: .72rem; }
      .map-page { padding: 0; }
      .map-stage { width: min(100vw, calc(100vh * 16 / 9)); }
      .slots { grid-template-columns: 1fr; }
      .slot { min-height: 78px; grid-template-columns: auto auto; }
      .slot::before { font-size: 1.6rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      *,*::before,*::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <div class="cover-screen hidden" id="cover" role="button" tabindex="0" aria-label="點擊進入大冒險地圖">
    <img src="cover.png" alt="挑戰吧！點擊任何部位遊戲開始">
  </div>

  <div class="info">
    <span>持有 <b id="count">0 / 3</b></span>
    <button class="reset" id="reset" type="button">🔄 清除進度</button>
  </div>

  <main class="map-page">
    <div class="map-stage">
      <img src="map-bg.png" alt="像素風大冒險地圖">
      <button class="hotspot hotspot-dynasty" data-cert="cert_dynasty" data-href="../示範1_朝代配對/index.html" type="button" aria-label="進入今夕是何夕遊戲"><span class="stamp">✓</span></button>
      <button class="hotspot hotspot-idiom" data-cert="cert_idiom" data-href="../示範2_成語填字/index.html" type="button" aria-label="進入這洞填哪個遊戲"><span class="stamp">✓</span></button>
      <button class="hotspot hotspot-warrior" data-cert="cert_warrior" data-href="../示範3_打怪RPG/index.html" type="button" aria-label="進入來人打怪啊遊戲"><span class="stamp">✓</span></button>
      <button class="hotspot hotspot-gate" id="gate-hotspot" type="button" aria-label="開啟中央通關大門"></button>
    </div>
  </main>

  <div class="overlay" id="gate-modal" role="dialog" aria-modal="true" aria-labelledby="gate-title">
    <div class="modal" id="modal-card">
      <button class="close" id="close" type="button" aria-label="關閉">×</button>
      <div class="gate-game">
        <h2 id="gate-title">🔒 三印之門</h2>
        <p class="desc">將背包中的憑證拖入正確凹槽，解開中央大門。</p>
        <div class="slots">
          <div class="slot" data-accept="cert_dynasty"><span class="slot-label">朝代</span></div>
          <div class="slot" data-accept="cert_idiom"><span class="slot-label">成語</span></div>
          <div class="slot" data-accept="cert_warrior"><span class="slot-label">勇者</span></div>
        </div>
        <div class="bag"><div class="bag-title">🎒 憑證背包</div><div class="badges" id="badges"></div></div>
        <p class="hint" id="hint">把已取得的憑證拖到上方凹槽</p>
      </div>
      <div class="victory">
        <div class="trophy">🏆</div>
        <h2>冒險完成！</h2>
        <p class="duration">總冒險時長<b id="duration">00 分 00 秒</b></p>
        <button class="again" id="again" type="button">重新遊戲</button>
      </div>
    </div>
  </div>

  <div class="cutscene" id="cutscene" role="button" tabindex="0" aria-label="點擊前往下一幕">
    <img class="scene-image" id="scene-image" src="ending-1.png" alt="">
    <div class="scene-shade"></div>
    <div class="ending-title" id="ending-title">★★★★★★★★★★<br>挑戰成功啦！！！！！<br>★★★★★★★★★★</div>
    <div class="narration">
      <p id="line-one"></p>
      <p id="line-two"></p>
      <div class="scene-meta"><span id="scene-count">1 / 4</span>・點擊畫面繼續</div>
    </div>
    <div class="final-card">
      <div>
        <h2>★★★★★<br>冒險完成<br>★★★★★</h2>
        <p>感謝你的挑戰。<br>願下一次冒險，我們再次相遇。</p>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";
      const CERTS = [
        { key: "cert_dynasty", icon: "🎴", name: "朝代之印" },
        { key: "cert_idiom", icon: "📝", name: "成語之印" },
        { key: "cert_warrior", icon: "⚔️", name: "勇者之印" }
      ];
      const cover = document.querySelector("#cover");
      const modal = document.querySelector("#gate-modal");
      const modalCard = document.querySelector("#modal-card");
      const badgesEl = document.querySelector("#badges");
      const hint = document.querySelector("#hint");
      const cutscene = document.querySelector("#cutscene");
      const sceneImage = document.querySelector("#scene-image");
      const SCENES = [
        ["ending-1.png", "當最後一道封印解除，旅程終於迎來答案。", "真正的寶藏，不只是終點，而是一路走來的勇氣。"],
        ["ending-2.png", "每一道難關，都化作前進的腳步。", "每一次思考，都點亮了一片新的風景。"],
        ["ending-3.png", "故事沒有真正的句點。", "每一次啟程，都將成為下一段傳說的開始。"],
        ["ending-4.png", "世界依然遼闊。", "當下一位冒險者出發時，新的故事，也將再次展開。"]
      ];
      let placed = new Set(), draggedBadge = null, ghost = null;
      let sceneIndex = 0, sceneLocked = false, endingTimer = null;

      function hasCert(key) {
        const value = localStorage.getItem(key);
        return value !== null && value !== "false" && value !== "0";
      }

      function initCover() {
        if (!sessionStorage.getItem("adventure_cover_seen")) cover.classList.remove("hidden");
      }

      function dismissCover() {
        if (cover.classList.contains("hidden") || cover.classList.contains("hide")) return;
        sessionStorage.setItem("adventure_cover_seen", "true");
        cover.classList.add("hide");
        setTimeout(() => cover.classList.add("hidden"), 760);
      }

      function refresh() {
        if (!localStorage.getItem("adventure_start")) localStorage.setItem("adventure_start", String(Date.now()));
        let count = 0;
        document.querySelectorAll(".hotspot[data-cert]").forEach(hotspot => {
          const complete = hasCert(hotspot.dataset.cert);
          hotspot.classList.toggle("complete", complete);
          if (complete) count++;
        });
        document.querySelector("#count").textContent = `${count} / 3`;
      }

      function openGate() {
        if (CERTS.every(cert => hasCert(cert.key))) {
          startCutscene();
          return;
        }
        placed = new Set();
        modalCard.classList.remove("victory-mode");
        document.querySelectorAll(".slot").forEach(slot => slot.classList.remove("filled","wrong","drag-over"));
        buildBadges();
        hint.textContent = "把已取得的憑證拖到上方凹槽";
        modal.classList.add("show");
      }

      function buildBadges() {
        badgesEl.replaceChildren();
        CERTS.filter(cert => hasCert(cert.key)).forEach(cert => {
          const badge = document.createElement("div");
          badge.className = "badge";
          badge.draggable = true;
          badge.dataset.cert = cert.key;
          badge.innerHTML = `<span>${cert.icon}</span><span>${cert.name}</span>`;
          badge.addEventListener("dragstart", event => {
            draggedBadge = badge;
            event.dataTransfer.setData("text/plain", cert.key);
            event.dataTransfer.effectAllowed = "move";
            requestAnimationFrame(() => badge.classList.add("dragging"));
          });
          badge.addEventListener("dragend", () => {
            badge.classList.remove("dragging");
            draggedBadge = null;
            document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
          });
          badge.addEventListener("pointerdown", startTouch);
          badgesEl.append(badge);
        });
        if (!badgesEl.children.length) badgesEl.innerHTML = '<span class="empty">背包還是空的，先去完成關卡吧！</span>';
      }

      function placeBadge(badge, slot) {
        if (!badge || !slot || badge.classList.contains("placed")) return;
        if (badge.dataset.cert === slot.dataset.accept) {
          slot.classList.add("filled");
          badge.classList.add("placed");
          placed.add(badge.dataset.cert);
          hint.textContent = `已放入 ${placed.size} / 3 枚憑證`;
          if (placed.size === 3) setTimeout(startCutscene, 420);
        } else {
          slot.classList.remove("wrong");
          void slot.offsetWidth;
          slot.classList.add("wrong");
          hint.textContent = "這枚憑證不屬於這個凹槽，再試一次！";
          setTimeout(() => slot.classList.remove("wrong"), 300);
        }
      }

      document.querySelectorAll(".slot").forEach(slot => {
        slot.addEventListener("dragover", event => {
          if (slot.classList.contains("filled")) return;
          event.preventDefault();
          event.dataTransfer.dropEffect = "move";
          slot.classList.add("drag-over");
        });
        slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
        slot.addEventListener("drop", event => {
          event.preventDefault();
          slot.classList.remove("drag-over");
          const key = event.dataTransfer.getData("text/plain");
          const badge = [...badgesEl.querySelectorAll(".badge")].find(item => item.dataset.cert === key) || draggedBadge;
          placeBadge(badge, slot);
        });
      });

      function startTouch(event) {
        if (event.pointerType === "mouse") return;
        event.preventDefault();
        const badge = event.currentTarget;
        draggedBadge = badge;
        badge.classList.add("dragging");
        badge.setPointerCapture(event.pointerId);
        ghost = document.createElement("div");
        ghost.className = "drag-ghost";
        ghost.textContent = badge.textContent;
        document.body.append(ghost);
        moveTouch(event);
        badge.addEventListener("pointermove", moveTouch);
        badge.addEventListener("pointerup", endTouch, { once: true });
        badge.addEventListener("pointercancel", endTouch, { once: true });
      }

      function moveTouch(event) {
        if (!ghost) return;
        ghost.style.left = `${event.clientX}px`;
        ghost.style.top = `${event.clientY}px`;
        ghost.hidden = true;
        const slot = document.elementFromPoint(event.clientX,event.clientY)?.closest(".slot:not(.filled)");
        ghost.hidden = false;
        document.querySelectorAll(".slot.drag-over").forEach(el => el.classList.remove("drag-over"));
        slot?.classList.add("drag-over");
      }

      function endTouch(event) {
        const badge = event.currentTarget;
        badge.removeEventListener("pointermove", moveTouch);
        ghost?.remove(); ghost = null;
        badge.classList.remove("dragging");
        const slot = document.elementFromPoint(event.clientX,event.clientY)?.closest(".slot:not(.filled)");
        document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
        placeBadge(badge, slot);
        draggedBadge = null;
      }

      function showVictory() {
        const start = Number(localStorage.getItem("adventure_start")) || Date.now();
        const total = Math.max(0, Math.floor((Date.now() - start) / 1000));
        const minutes = Math.floor(total / 60), seconds = total % 60;
        document.querySelector("#duration").textContent = `${String(minutes).padStart(2,"0")} 分 ${String(seconds).padStart(2,"0")} 秒`;
        modalCard.classList.add("victory-mode");
        modal.classList.add("show");
      }

      function renderScene() {
        const [image, first, second] = SCENES[sceneIndex];
        sceneImage.src = image;
        sceneImage.alt = `結局過場第 ${sceneIndex + 1} 幕`;
        document.querySelector("#line-one").textContent = `「${first}」`;
        document.querySelector("#line-two").textContent = `「${second}」`;
        document.querySelector("#scene-count").textContent = `${sceneIndex + 1} / 4`;
        document.querySelector("#ending-title").style.display = sceneIndex === 0 ? "" : "none";
      }

      function startCutscene() {
        modal.classList.remove("show");
        sceneIndex = 0;
        sceneLocked = false;
        cutscene.classList.remove("final","changing");
        renderScene();
        cutscene.classList.add("show");
        cutscene.focus();
      }

      function advanceCutscene() {
        if (!cutscene.classList.contains("show") || sceneLocked) return;
        if (sceneIndex < SCENES.length - 1) {
          sceneLocked = true;
          cutscene.classList.add("changing");
          setTimeout(() => {
            sceneIndex++;
            renderScene();
            cutscene.classList.remove("changing");
            sceneLocked = false;
          }, 420);
        } else {
          sceneLocked = true;
          cutscene.classList.add("final");
          endingTimer = setTimeout(() => {
            cutscene.classList.remove("show","final");
            showVictory();
          }, 5000);
        }
      }

      function clearProgress(includeSession) {
        localStorage.clear();
        if (includeSession) sessionStorage.clear();
        location.reload();
      }

      cover.addEventListener("click", dismissCover);
      cover.addEventListener("keydown", event => { if (event.key === "Enter" || event.key === " ") dismissCover(); });
      document.querySelectorAll(".hotspot[data-href]").forEach(hotspot => hotspot.addEventListener("click", () => location.href = hotspot.dataset.href));
      document.querySelector("#gate-hotspot").addEventListener("click", openGate);
      document.querySelector("#close").addEventListener("click", () => modal.classList.remove("show"));
      modal.addEventListener("click", event => { if (event.target === modal) modal.classList.remove("show"); });
      document.addEventListener("keydown", event => { if (event.key === "Escape") modal.classList.remove("show"); });
      document.querySelector("#reset").addEventListener("click", () => clearProgress(false));
      document.querySelector("#again").addEventListener("click", () => clearProgress(true));
      cutscene.addEventListener("click", advanceCutscene);
      cutscene.addEventListener("keydown", event => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          advanceCutscene();
        }
      });
      window.addEventListener("pageshow", refresh);
      initCover();
      refresh();
    })();
  </script>
</body>
</html>
